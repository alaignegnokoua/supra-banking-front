<div class="container">
  <h1>{{ isEdit ? 'Modifier le compte' : 'Créer un compte' }}</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
    <div class="form-group">
      <label for="numero">Numéro de compte</label>
      <input
        id="numero"
        type="text"
        formControlName="numero"
        class="form-control"
        placeholder="Entrez le numéro de compte"
      />
    </div>

    <div class="form-group">
      <label for="type">Type de compte</label>
      <select id="type" formControlName="type" class="form-control">
        <option value="CHECKING">Courant</option>
        <option value="SAVINGS">Épargne</option>
        <option value="INVESTMENT">Investissement</option>
      </select>
    </div>

    <div class="form-group">
      <label for="devise">Devise</label>
      <select id="devise" formControlName="devise" class="form-control">
        <option value="EUR">Euro (EUR)</option>
        <option value="USD">Dollar (USD)</option>
        <option value="GBP">Livre (GBP)</option>
      </select>
    </div>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <div class="actions">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
        {{ loading ? 'Sauvegarde...' : 'Enregistrer' }}
      </button>
      <a routerLink="/comptes" class="btn btn-secondary">Annuler</a>
    </div>
  </form>
</div>
