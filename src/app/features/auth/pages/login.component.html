<div class="auth-container">
  <div class="auth-card">
    <h1>Connexion</h1>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-control"
          placeholder="Entrez votre email"
          [class.is-invalid]="email?.invalid && email?.touched"
        />
        <div *ngIf="email?.errors?.['required'] && email?.touched" class="error-message">
          Email requis
        </div>
        <div *ngIf="email?.errors?.['email'] && email?.touched" class="error-message">
          Email invalide
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="Entrez votre mot de passe"
          [class.is-invalid]="password?.invalid && password?.touched"
        />
        <div *ngIf="password?.errors?.['required'] && password?.touched" class="error-message">
          Mot de passe requis
        </div>
        <div *ngIf="password?.errors?.['minlength'] && password?.touched" class="error-message">
          Minimum 6 caractères
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-block"
        [disabled]="loginForm.invalid || loading"
      >
        {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Pas encore de compte?</p>
      <button class="btn btn-link" (click)="navigateToRegister()">
        S'inscrire
      </button>
    </div>
  </div>
</div>
